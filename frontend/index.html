<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenSpec WebUI</title>
    <link rel="icon" type="image/svg+xml" href="/app-icon.svg" />
    <link rel="icon" type="image/x-icon" sizes="16x16 32x32" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1e1e1e" />
    <script>
      (() => {
        const themeStorageKey = 'openspec-theme';
        const localeStorageKey = 'openspec-locale';
        const isStoredTheme = (value) => value === 'light' || value === 'dark' || value === 'system';
        const normalizeLocale = (value) => {
          if (typeof value !== 'string') {
            return null;
          }

          const normalized = value.toLowerCase().replace(/_/g, '-');

          if (normalized === 'en' || normalized.startsWith('en-')) {
            return 'en';
          }

          if (normalized === 'ja' || normalized.startsWith('ja-')) {
            return 'ja';
          }

          if (normalized === 'pt-br' || normalized.startsWith('pt-')) {
            return 'pt-BR';
          }

          if (normalized === 'es' || normalized.startsWith('es-')) {
            return 'es';
          }

          if (normalized === 'zh-cn' || normalized.startsWith('zh-')) {
            return 'zh-CN';
          }

          if (normalized === 'fr' || normalized.startsWith('fr-')) {
            return 'fr';
          }

          if (normalized === 'de' || normalized.startsWith('de-')) {
            return 'de';
          }

          return null;
        };

        try {
          const storedTheme = localStorage.getItem(themeStorageKey);
          const preferredTheme = isStoredTheme(storedTheme) ? storedTheme : 'dark';
          const effectiveTheme =
            preferredTheme === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : preferredTheme;

          document.documentElement.setAttribute('data-theme', effectiveTheme);
        } catch {
          document.documentElement.setAttribute('data-theme', 'dark');
        }

        try {
          const storedLocale = normalizeLocale(localStorage.getItem(localeStorageKey));
          const browserLocales = Array.isArray(navigator.languages) && navigator.languages.length
            ? navigator.languages
            : [navigator.language];
          const browserLocale = browserLocales.map(normalizeLocale).find(Boolean) ?? 'en';
          const locale = storedLocale ?? browserLocale;

          document.documentElement.setAttribute('lang', locale);
          document.documentElement.setAttribute('dir', 'ltr');
        } catch {
          document.documentElement.setAttribute('lang', 'en');
          document.documentElement.setAttribute('dir', 'ltr');
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
