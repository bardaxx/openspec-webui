schema: spec-driven

openspec_roadmap:
  mode: default
  register: openspec/roadmap.md
  token_budget:
    max_input_tokens: 18000
    reserved_output_tokens: 4000
  context_loading:
    include_only:
      - roadmap_register
      - selected_slice
      - linked_openspec_change
      - directly_referenced_files
    load_full_prd_when: "slice_is_ambiguous"
  pruning:
    compact_history_after_archived_slices: 8
  quality_gate:
    applied_requires:
      - tests_pass
      - affected_specs_updated
      - no_unrelated_files_changed
      - acceptance_verified

context: |
  OpenSpec WebUI: local-first browser UI for exploring and iterating on OpenSpec-compatible directories.

  Tech stack: Node.js 20+, TypeScript, Fastify, Svelte 5, Vite, chokidar.

  Directory conventions:
  - src/ → CLI, server, parser, shared types, watcher logic
  - frontend/ → Svelte app, UI components, static browser assets
  - openspec/ → project context, main specs, active changes, archived changes

  Constraints:
  - Local-first, defaults to 127.0.0.1
  - User-visible behavior changes should be captured in OpenSpec before or alongside implementation
